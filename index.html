<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cabin Ledger</title>
<style>
:root{
  --paper:#f7f4ee;
  --ink:#1f2a23;
  --ink-soft:#52605a;
  --line:#d8d2c4;
  --pine:#2d4a3e;
  --pine-deep:#1c2f27;
  --rust:#a8552f;
  --rust-soft:#c97a4f;
  --gold:#b08d2f;
  --surplus:#3f6b4e;
  --shortfall:#a8552f;
  --card:#fffdf8;
  --shadow:0 1px 2px rgba(31,42,35,0.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
  font-size:14px;
  line-height:1.45;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1180px;margin:0 auto;padding:28px 24px 80px;}

/* ---------- header ---------- */
.masthead{
  display:flex;justify-content:space-between;align-items:flex-end;
  border-bottom:3px solid var(--ink);
  padding-bottom:14px;margin-bottom:6px;
  flex-wrap:wrap;gap:10px;
}
.masthead .title-block{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;}
.masthead h1{
  font-family:'Iowan Old Style',Georgia,serif;
  font-weight:400;font-size:30px;letter-spacing:0.01em;margin:0;color:var(--pine-deep);
}
.masthead .sub{
  font-family:'Courier New',monospace;font-size:11px;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--ink-soft);
}
.year-tabs{display:flex;gap:6px;align-items:center;}
.year-tab{
  font-family:'Courier New',monospace;font-size:13px;letter-spacing:0.05em;
  padding:6px 14px;border:1px solid var(--ink);background:transparent;color:var(--ink);
  cursor:pointer;border-radius:0;
}
.year-tab.active{background:var(--pine-deep);color:var(--paper);border-color:var(--pine-deep);}
.year-tab:hover:not(.active){background:var(--line);}
.add-year{
  font-family:'Courier New',monospace;font-size:13px;width:30px;height:30px;
  border:1px dashed var(--ink-soft);background:transparent;color:var(--ink-soft);cursor:pointer;
}
.add-year:hover{border-color:var(--ink);color:var(--ink);}

.ribbon{
  display:flex;gap:18px;font-family:'Courier New',monospace;font-size:11px;
  color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.08em;
  padding:8px 0 22px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:22px;
}
.ribbon b{color:var(--ink);font-weight:700;}

.data-toolbar{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  font-family:'Courier New',monospace;font-size:10.5px;letter-spacing:0.03em;
  color:var(--ink-soft);padding:8px 0 18px;
}
.data-toolbar-label{text-transform:none;letter-spacing:0;}

/* ---------- nav ---------- */
.tabs{display:flex;gap:2px;margin-bottom:22px;flex-wrap:wrap;}
.tab{
  font-family:'Courier New',monospace;font-size:12px;letter-spacing:0.06em;text-transform:uppercase;
  padding:9px 16px;background:transparent;border:1px solid var(--line);color:var(--ink-soft);
  cursor:pointer;
}
.tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.tab:hover:not(.active){border-color:var(--ink-soft);color:var(--ink);}

/* ---------- cards / sections ---------- */
.card{
  background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);
  padding:22px 24px;margin-bottom:20px;
}
.card h2{
  font-size:15px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;
  color:var(--pine-deep);margin:0 0 16px;display:flex;justify-content:space-between;align-items:center;
}
.card h2 .hint{font-family:'Courier New',monospace;font-size:10px;letter-spacing:0.04em;
  text-transform:none;color:var(--ink-soft);font-weight:400;}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:8px;}
.stat{
  border-left:3px solid var(--pine);padding:4px 0 4px 14px;
}
.stat.warn{border-left-color:var(--rust);}
.stat.good{border-left-color:var(--surplus);}
.stat .num{font-size:24px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;}
.stat .lbl{font-family:'Courier New',monospace;font-size:10px;letter-spacing:0.06em;
  text-transform:uppercase;color:var(--ink-soft);margin-top:2px;}
.stat .sub{font-size:11px;color:var(--ink-soft);margin-top:1px;}

/* ---------- tables ---------- */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{
  text-align:left;font-family:'Courier New',monospace;font-size:10px;letter-spacing:0.06em;
  text-transform:uppercase;color:var(--ink-soft);font-weight:600;
  padding:8px 10px;border-bottom:1px solid var(--ink);white-space:nowrap;
}
td{padding:7px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.num-cell{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
.tr-total td{font-weight:700;border-top:1.5px solid var(--ink);border-bottom:none;background:#f1eee3;}
.tr-month{background:transparent;cursor:pointer;border-bottom:1px solid var(--line);}
.tr-month:hover{background:#e8e4da !important;}
.tr-month td{font-weight:400;color:var(--ink);padding-top:13px;padding-bottom:13px;}
.tr-month td:first-child{font-weight:600;color:var(--pine-deep);}
.tr-month .chev{display:inline-block;width:14px;font-family:'Courier New',monospace;color:var(--ink-soft);font-weight:400;}
.expand-controls{font-family:'Courier New',monospace;font-size:10.5px;letter-spacing:0.04em;text-transform:uppercase;color:var(--ink-soft);}
.link-btn{background:none;border:none;padding:0;font:inherit;color:var(--ink-soft);cursor:pointer;text-decoration:underline;text-decoration-color:var(--line);text-underline-offset:2px;}
.link-btn:hover{color:var(--pine-deep);text-decoration-color:var(--pine-deep);}
.expand-controls .sep{margin:0 6px;color:var(--line);}
.muted{color:var(--ink-soft);}
.pos{color:var(--surplus);font-weight:600;}
.neg{color:var(--shortfall);font-weight:600;}
.tag{
  font-family:'Courier New',monospace;font-size:9px;letter-spacing:0.04em;text-transform:uppercase;
  padding:2px 6px;border:1px solid var(--line);border-radius:2px;color:var(--ink-soft);
}
.tag.direct{border-color:var(--pine);color:var(--pine);}
.tag.vrbo{border-color:var(--gold);color:var(--gold);}
.tag.airbnb-couples{border-color:var(--rust-soft);color:var(--rust-soft);}
.tag.airbnb-whole{border-color:var(--rust);color:var(--rust);}

/* ---------- inputs ---------- */
input[type=text],input[type=number],select{
  font-family:inherit;font-size:13px;color:var(--ink);
  border:1px solid var(--line);background:#fff;padding:5px 7px;width:100%;
}
input[type=number]{font-variant-numeric:tabular-nums;}
input:focus,select:focus{outline:none;border-color:var(--pine);}
.row-actions{display:flex;gap:6px;justify-content:flex-end;}
.btn{
  font-family:'Courier New',monospace;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;
  padding:6px 12px;border:1px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;
}
.btn:hover{background:var(--ink);color:var(--paper);}
.btn.primary{background:var(--pine-deep);color:var(--paper);border-color:var(--pine-deep);}
.btn.primary:hover{background:var(--pine);}
.btn.danger{border-color:var(--rust);color:var(--rust);}
.btn.danger:hover{background:var(--rust);color:#fff;}
.btn.ghost{border-color:transparent;color:var(--ink-soft);}
.btn.ghost:hover{background:var(--line);color:var(--ink);}
.btn.small{padding:3px 9px;font-size:10px;}
.icon-btn{
  width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;
  border:1px solid var(--line);background:transparent;color:var(--ink-soft);cursor:pointer;font-size:14px;
  line-height:1;
}
.icon-btn:hover{border-color:var(--rust);color:var(--rust);}

.month-detail{background:#fbf9f3;border-bottom:1px solid var(--line);}
.month-detail-inner{padding:18px 24px 22px 40px;display:grid;grid-template-columns:1.3fr 1fr;gap:24px;}
@media(max-width:880px){.month-detail-inner{grid-template-columns:1fr;}}
.subhead{font-family:'Courier New',monospace;font-size:10px;letter-spacing:0.07em;text-transform:uppercase;
  color:var(--ink-soft);margin:0 0 8px;display:flex;justify-content:space-between;align-items:center;}
.mini-table td,.mini-table th{padding:5px 8px;font-size:12px;}
.add-line{display:flex;gap:6px;margin-top:8px;align-items:center;}
.add-line input,.add-line select{flex:1;}
.empty-note{font-size:12px;color:var(--ink-soft);font-style:italic;padding:8px 0;}
.calc-strip{
  font-family:'Courier New',monospace;font-size:11px;color:var(--ink-soft);
  background:#f1eee3;padding:10px 12px;margin-top:10px;line-height:1.7;border-left:2px solid var(--line);
}
.calc-strip .eq{color:var(--ink);}
.flag{
  font-family:'Courier New',monospace;font-size:10px;letter-spacing:0.04em;text-transform:uppercase;
  color:var(--ink-soft);display:inline-flex;align-items:center;gap:5px;
}
.flag .dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex:none;}
.flag.paid .dot{background:var(--surplus);}
.flag.upcoming .dot{background:var(--rust-soft);}
.flag.current .dot{background:var(--ink-soft);}
.flag.surplus .dot{background:var(--surplus);}

/* breakeven gauge */
.gauge-track{height:10px;background:var(--line);border-radius:6px;overflow:hidden;margin:10px 0 4px;}
.gauge-fill{height:100%;background:var(--pine);transition:width .3s;}
.gauge-fill.over{background:var(--rust);}

footer{
  font-family:'Courier New',monospace;font-size:10px;color:var(--ink-soft);
  text-align:center;padding-top:24px;letter-spacing:0.05em;
}
.toast{
  position:fixed;bottom:18px;right:18px;background:var(--ink);color:var(--paper);
  padding:9px 16px;font-family:'Courier New',monospace;font-size:11px;letter-spacing:0.04em;
  opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;z-index:50;
}
.toast.show{opacity:1;transform:translateY(0);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:880px){.two-col{grid-template-columns:1fr;}}
.field-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.field-row label{flex:0 0 150px;font-size:12px;color:var(--ink-soft);}
.note-box{font-size:11.5px;color:var(--ink-soft);background:#f1eee3;padding:10px 12px;margin-top:10px;border-left:2px solid var(--gold);}
.loading{padding:60px;text-align:center;color:var(--ink-soft);font-family:'Courier New',monospace;font-size:12px;}
select.src{font-family:'Courier New',monospace;font-size:10px;text-transform:uppercase;}

/* ---------- print / PDF reports ---------- */
#print-root{display:none;}
@media print{
  body{background:#fff;font-size:11pt;margin:0;}
  #root{display:none;}
  #print-root{display:block;padding:0;margin:0;}
  .pr-page{page-break-after:always;padding:36pt 48pt;max-width:100%;}
  .pr-page:last-child{page-break-after:avoid;}
  .pr-header{border-bottom:2pt solid #1c2f27;padding-bottom:10pt;margin-bottom:20pt;}
  .pr-title{font-size:20pt;font-weight:400;color:#1c2f27;margin:0 0 3pt;}
  .pr-sub{font-family:'Courier New',monospace;font-size:8pt;color:#52605a;letter-spacing:0.08em;text-transform:uppercase;}
  .pr-section{margin-bottom:22pt;}
  .pr-section-title{font-family:'Courier New',monospace;font-size:8pt;letter-spacing:0.1em;text-transform:uppercase;
    color:#52605a;border-bottom:0.5pt solid #d8d2c4;padding-bottom:4pt;margin-bottom:10pt;}
  .pr-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12pt;margin-bottom:14pt;}
  .pr-stat{border-left:3pt solid #2d4a3e;padding:2pt 0 2pt 10pt;}
  .pr-stat.warn{border-left-color:#a8552f;}
  .pr-stat.good{border-left-color:#3f6b4e;}
  .pr-stat .num{font-size:16pt;font-weight:600;color:#1f2a23;}
  .pr-stat .lbl{font-family:'Courier New',monospace;font-size:7pt;text-transform:uppercase;letter-spacing:0.06em;color:#52605a;margin-top:2pt;}
  .pr-gauge{height:6pt;background:#d8d2c4;margin:6pt 0 4pt;border-radius:3pt;overflow:hidden;}
  .pr-gauge-fill{height:100%;background:#2d4a3e;}
  .pr-gauge-fill.over{background:#a8552f;}
  .pr-table{width:100%;border-collapse:collapse;font-size:9pt;}
  .pr-table th{text-align:left;font-family:'Courier New',monospace;font-size:7pt;letter-spacing:0.06em;
    text-transform:uppercase;color:#52605a;padding:5pt 8pt;border-bottom:1pt solid #1f2a23;}
  .pr-table td{padding:5pt 8pt;border-bottom:0.5pt solid #d8d2c4;vertical-align:middle;}
  .pr-table tr:last-child td{border-bottom:none;}
  .pr-table .num-cell{text-align:right;font-variant-numeric:tabular-nums;}
  .pr-table .tr-total td{font-weight:700;border-top:1pt solid #1f2a23;border-bottom:none;background:#f1eee3;}
  .pr-bar-cell{width:160pt;}
  .pr-bar{position:relative;height:8pt;background:#ece9e0;border-radius:2pt;overflow:hidden;}
  .pr-bar-exp{position:absolute;left:0;top:0;height:100%;background:#e2c9b8;}
  .pr-bar-inc{position:absolute;left:0;top:0;height:100%;background:#2d4a3e;opacity:0.85;}
  .pr-pos{color:#3f6b4e;font-weight:600;}
  .pr-neg{color:#a8552f;font-weight:600;}
  .pr-two-col{display:grid;grid-template-columns:1fr 1fr;gap:20pt;margin-bottom:16pt;}
  .pr-note{font-size:8pt;color:#52605a;font-style:italic;margin-top:6pt;}
  .pr-src-row{margin-bottom:8pt;}
  .pr-src-bar{height:6pt;background:#ece9e0;border-radius:2pt;overflow:hidden;margin-top:3pt;}
  .pr-src-bar-fill{height:100%;background:#2d4a3e;}
}
</style>
</head>
<body>
<div id="print-root"></div>

const fmt=(n)=>{
  const v = (n===undefined||n===null||isNaN(n))?0:n;
  const sign = v<0 ? "-" : "";
  return sign+"$"+Math.abs(v).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
};
const fmtShort=(n)=>{
  const v=(n===undefined||n===null||isNaN(n))?0:n;
  const sign=v<0?"-":"";
  return sign+"$"+Math.abs(v).toLocaleString("en-US",{maximumFractionDigits:0});
};
const uid=()=>Math.random().toString(36).slice(2,10);

function defaultExpenseItems(){
  return [
    {id:uid(),name:"Internet",amount:35},

    {id:uid(),name:"Quickbooks",amount:70},
    {id:uid(),name:"Propane (annual/12)",amount:91.67},
  ];
}

function defaultYear(year, startingBalance){
  return {
    year,
    ownerSplit:{ladd:60, dane:40},
    expenseItems: defaultExpenseItems(),
    months: MONTH_NAMES.map((name,i)=>({
      id:uid(),
      name,
      manualStartingBalance: i===0 ? (startingBalance ?? 0) : null,
      manualAccountBalanceNote:"",
      bookings:[],
      expenseAdjustments:[],
      ranger:[],
      contributionStatus: "Upcoming",
    }))
  };
}

function bk(guest,amount,source){ return {id:uid(), guest, amount, source: source||"Direct"}; }
function adj(label,amount){ return {id:uid(), label, amount}; }
function rg(label,amount){ return {id:uid(), label, amount}; }

function App(){
  const [loaded,setLoaded]=useState(false);
  const [years,setYears]=useState({});
  const [activeYear,setActiveYear]=useState(null);
  const [tab,setTab]=useState("ledger");
  const [openMonths,setOpenMonths]=useState(new Set());
  const [toast,setToast]=useState("");
  const saveTimer=useRef(null);

  const showToast=(msg)=>{
    setToast(msg);
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>setToast(""),1800);
  };

  // ---- load ----
  useEffect(()=>{
    try{
      const raw = localStorage.getItem('cabin-ledger-data');
      if(raw){
        const data = JSON.parse(raw);
        setYears(data.years || {});
        setActiveYear(data.activeYear || Object.keys(data.years||{})[0] || null);
      } else {
        setYears({2025: seed2025(), 2026: seed2026()});
        setActiveYear(2026);
      }
    }catch(e){
      setYears({2025: seed2025(), 2026: seed2026()});
      setActiveYear(2026);
    }
    setLoaded(true);
  },[]);

  // ---- save (debounced) ----
  useEffect(()=>{
    if(!loaded) return;
    const t = setTimeout(()=>{
      try{
        localStorage.setItem('cabin-ledger-data', JSON.stringify({years, activeYear}));
      }catch(e){ console.error("save failed", e); }
    }, 500);
    return ()=>clearTimeout(t);
  },[years, activeYear, loaded]);

  const updateYear=(yearKey, fn)=>{
    setYears(prev=>{
      const copy = JSON.parse(JSON.stringify(prev));
      fn(copy[yearKey]);
      return copy;
    });
  };

  const fileInputRef = useRef(null);

  const exportData=()=>{
    const payload = {years, activeYear, exportedAt: new Date().toISOString(), app:"cabin-ledger"};
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const datePart = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `cabin-ledger-${datePart}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("File saved");
  };

  const triggerImport=()=>{
    if(fileInputRef.current) fileInputRef.current.click();
  };

  const handleImportFile=(e)=>{
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      try{
        const data = JSON.parse(ev.target.result);
        if(!data.years) throw new Error("not a cabin ledger backup");
        setYears(data.years);
        setActiveYear(data.activeYear || Object.keys(data.years)[0]);
        showToast("File opened");
      }catch(err){
        showToast("Couldn't open that file");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const yearKeys = useMemo(()=>Object.keys(years).map(Number).sort((a,b)=>a-b),[years]);
  const yr = activeYear!=null ? years[activeYear] : null;

  const addYear=()=>{
    const newYear = yearKeys.length ? Math.max(...yearKeys)+1 : new Date().getFullYear();
    if(years[newYear]) return;
    // carry forward expense items from latest year if present
    const latest = yearKeys.length ? years[yearKeys[yearKeys.length-1]] : null;
    setYears(prev=>{
      const copy = {...prev};
      const fresh = defaultYear(newYear, 0);
      if(latest) fresh.expenseItems = JSON.parse(JSON.stringify(latest.expenseItems));
      if(latest) fresh.ownerSplit = {...latest.ownerSplit};
      copy[newYear]=fresh;
      return copy;
    });
    setActiveYear(newYear);
    showToast(`${newYear} ledger created`);
  };

  if(!loaded || !yr){
    return <div className="loading">loading ledger…</div>;
  }

  return (
    <div className="wrap">
      <Header
        yearKeys={yearKeys}
        activeYear={activeYear}
        setActiveYear={setActiveYear}
        addYear={addYear}
        yr={yr}
        onExport={exportData}
        onImport={triggerImport}
      />
      <input type="file" accept="application/json" ref={fileInputRef} style={{display:"none"}} onChange={handleImportFile} />
      <Tabs tab={tab} setTab={setTab} />
      {tab==="ledger" && (
        <LedgerView
          yr={yr}
          updateYear={(fn)=>updateYear(activeYear, fn)}
          openMonths={openMonths}
          setOpenMonths={setOpenMonths}
          showToast={showToast}
        />
      )}
      {tab==="expenses" && (
        <ExpensesView yr={yr} updateYear={(fn)=>updateYear(activeYear, fn)} showToast={showToast} />
      )}
      {tab==="contributions" && (
        <ContributionsView yr={yr} updateYear={(fn)=>updateYear(activeYear, fn)} />
      )}
      {tab==="analytics" && (
        <AnalyticsView years={years} yr={yr} yearKeys={yearKeys} />
      )}
      {tab==="ranger" && (
        <RangerView yr={yr} updateYear={(fn)=>updateYear(activeYear, fn)} />
      )}
      <footer>cabin ledger · changes save automatically in this browser · use Save / Open to move between computers</footer>
      <div className={"toast"+(toast?" show":"")}>{toast}</div>
    </div>
  );
}

    let t=0; for(let mo=1;mo<=12;mo++){const k=`${yr.year}-${String(mo).padStart(2,'0')}`; t+=effectiveAmount(e,k);} return s+t;
  },0);
  const pct = annualExpEst>0?(totalIncome/annualExpEst*100):0;
  const profit = totalIncome - annualExpEst;
  const totalBookings = computed.reduce((s,m)=>s+m.bookings.length,0);
  const avgVal = totalBookings>0?totalIncome/totalBookings:0;
  const maxInc = Math.max(1,...tracked.map(m=>m.totalIncome),Math.max(1,...tracked.map(m=>m.totalExpense)));

  const srcTotal = Object.values(sourceTotals).reduce((a,b)=>a+b,0)||1;
  const anyTagged = computed.some(m=>m.bookings.some(b=>b.sourceTagged));
  const generated = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  const monthRows = tracked.map(m=>{
    const net = m.totalIncome - m.totalExpense;

  const baselineRows = yr.expenseItems.map(e=>`
    <tr><td>${e.name}</td><td class="num-cell">${fmt(Number(e.amount)||0)}</td><td class="num-cell" style="color:#52605a;font-size:8pt">${(e.changes&&e.changes.length)?e.changes.map(c=>`${c.effectiveMonth?MONTH_NAMES[parseInt(c.effectiveMonth.split('-')[1])-1]+' '+c.effectiveMonth.split('-')[0]:''}: ${fmt(Number(c.amount)||0)}`).join(', '):''}</td></tr>`).join('');

  return `<div class="pr-page">
    <div class="pr-header">
      <div class="pr-title">Hummingbird Hideaway — ${yr.year} Analysis</div>
      <div class="pr-sub">Year-to-Date & Annual Projected Report · Generated ${generated}</div>
    </div>

    <div class="pr-section">
      <div class="pr-section-title">Break-Even Snapshot</div>
      <div class="pr-stats">
        <div class="pr-stat"><div class="num">${fmt(totalIncome)}</div><div class="lbl">Projected Income YTD</div></div>
        <div class="pr-stat warn"><div class="num">${fmt(annualExpEst)}</div><div class="lbl">Annual Expense Est.</div></div>
        <div class="pr-stat ${pct>=100?'good':'warn'}"><div class="num">${pct.toFixed(1)}%</div><div class="lbl">Of Break-Even Covered</div></div>
        <div class="pr-stat ${profit>=0?'good':'warn'}"><div class="num">${profit>=0?fmt(profit):'—'}</div><div class="lbl">Profit ${profit<0?'(not yet)':''}</div></div>
      </div>
      <div class="pr-gauge"><div class="pr-gauge-fill${pct>100?' over':''}" style="width:${Math.min(100,pct).toFixed(1)}%"></div></div>

// L = starting balance (manual override, or prev month's ending balance N)
// M = contribution owners must deposit at start of month to cover expenses
//     M = max(0, totalExpense - L) ... negative means surplus, no contribution needed
// N = ending balance = L + M + income - expenses  (what actually lands in the account)
// Next month's L = this month's N  (unless manually overridden)

// Returns the effective amount for an expense item in a given month (YYYY-MM string)
function effectiveAmount(item, monthKey){
  const changes = (item.changes||[]).filter(c=>c.effectiveMonth && c.effectiveMonth<=monthKey);
  if(changes.length===0) return Number(item.amount)||0;
  // pick the latest change on or before this month
  changes.sort((a,b)=>a.effectiveMonth<b.effectiveMonth?-1:1);
  return Number(changes[changes.length-1].amount)||0;
}

function computeMonths(yr){
  const out=[];
  let prevN=null;
  yr.months.forEach((m,i)=>{
    if(m.notTracked){
      out.push({...m, totalIncome:0, baseline:0, adjTotal:0, totalExpense:0, L:null, M:0, N:null,
        rangerTotal:0, calculatedM:0, hasContributionOverride:false, effectiveItems:[]});
      prevN=null;
      return;
    }
    // compute per-item effective amounts for this month
    const monthKey = `${yr.year}-${String(i+1).padStart(2,'0')}`;
    const effectiveItems = yr.expenseItems.map(e=>({
      ...e, effectiveAmt: effectiveAmount(e, monthKey)
    }));
    const baseline = effectiveItems.reduce((s,e)=>s+e.effectiveAmt, 0);
    const totalIncome = m.bookings.reduce((s,b)=>s+(Number(b.amount)||0),0);
    const adjTotal = m.expenseAdjustments.reduce((s,a)=>s+(Number(a.amount)||0),0);
    const totalExpense = baseline + adjTotal;
    let L;
    if(m.manualStartingBalance!==null && m.manualStartingBalance!==undefined){
      L = Number(m.manualStartingBalance)||0;
    } else if(prevN!==null){
      L = prevN;
    } else {
      L = 0;
    }
    const calculatedM = Math.max(0, totalExpense - L);
    const hasOverride = m.manualContribution!==null && m.manualContribution!==undefined;
    const M = hasOverride ? Number(m.manualContribution)||0 : calculatedM;
    const N = L + M + totalIncome - totalExpense;
    const rangerTotal = (m.ranger||[]).reduce((s,r)=>s+(Number(r.amount)||0),0);
    out.push({
      ...m, totalIncome, baseline, adjTotal, totalExpense, L, M, N, rangerTotal,
      calculatedM, hasContributionOverride: hasOverride, effectiveItems, monthKey
    });
    prevN = N;
  });
  return out;
}

function sourceTag(src){
  const s=(src||"Direct").toLowerCase();
  let cls="direct";
  if(s==="vrbo") cls="vrbo";
  else if(s==="couples airbnb") cls="airbnb-couples";
  else if(s==="whole house airbnb") cls="airbnb-whole";
  return <span className={"tag "+cls}>{src||"Direct"}</span>;
}

      const a = y.months[monthIdx].expenseAdjustments.find(x=>x.id===aId);

          <div className="stat warn"><div className="num">{fmtShort(totalExpenseYTD)}</div><div className="lbl">Total Expenses</div></div>
          <div className={"stat"+(totalContribYTD>0?" warn":"")}><div className="num">{fmtShort(totalContribYTD)}</div><div className="lbl">Owner Contributions Needed</div></div>
          <div className="stat good"><div className="num">{fmtShort(totalSurplusYTD)}</div><div className="lbl">Surplus Months (offset)</div></div>
          <div className="stat"><div className="num">{lastMonth?fmtShort(lastMonth.N):"$0"}</div><div className="lbl">Balance, end of {lastMonth?.name}</div></div>
        </div>
      </div>

      <div className="card" style={{padding:0}}>
        <div style={{padding:"22px 24px 4px",display:"flex",justifyContent:"space-between",alignItems:"baseline",flexWrap:"wrap",gap:8}}>
          <h2 style={{margin:0}}>Monthly Rolling Balance</h2>
          <div className="expand-controls">
            <button className="link-btn" onClick={()=>setOpenMonths(new Set(computed.filter(m=>!m.notTracked).map(m=>m.id)))}>Expand all</button>
            <span className="sep">·</span>
            <button className="link-btn" onClick={()=>setOpenMonths(new Set())}>Collapse all</button>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th style={{width:"22%"}}>Month</th>
              <th className="num-cell">Starting</th>
              <th className="num-cell">Income</th>
              <th className="num-cell">Expenses</th>
              <th className="num-cell">Contribution</th>
              <th className="num-cell">Ending</th>
            </tr>
          </thead>
          <tbody>
            {computed.map((m,idx)=>{
              const isOpen = openMonths.has(m.id);
              const toggle = ()=>setOpenMonths(prev=>{
                const next = new Set(prev);
                if(next.has(m.id)) next.delete(m.id); else next.add(m.id);
                return next;
              });
              if(m.notTracked){
                return (
                  <tr key={m.id} className="tr-month" style={{cursor:"default",opacity:0.4}}>
                    <td><span className="chev"> </span>{m.name}</td>
                    <td colSpan="5" className="muted" style={{fontStyle:"italic",fontWeight:400}}>Not tracked — ledger starts later this year</td>
                  </tr>
                );
              }
              // row color: contribution due = warm rust tint, strong positive net = pine tint, else neutral
              const needsContrib = m.M > 0.01;
              const rowBg = idx % 2 === 0 ? "transparent" : "#f4f1ea";
              return (
                <React.Fragment key={m.id}>
                  <tr className="tr-month" onClick={toggle} style={{background:rowBg}}>
                    <td><span className="chev">{isOpen?"▾":"▸"}</span>{m.name}</td>
                    <td className="num-cell">{fmtShort(m.L)}</td>
                    <td className="num-cell">{fmtShort(m.totalIncome)}</td>
                    <td className="num-cell muted">{fmtShort(m.totalExpense)}</td>
                    <td className={"num-cell "+(needsContrib?"neg":"")}>
                      {needsContrib ? fmtShort(m.M) : "—"}
                    </td>
                    <td className={"num-cell "+(m.N>m.L+0.01?"pos":m.N<m.L-0.01?"neg":"")}>{fmtShort(m.N)}</td>
                  </tr>
                  {isOpen && (
                    <tr className="month-detail">
                      <td colSpan="6" style={{padding:0}}>
                        <MonthDetail
                          m={m}
                          monthIdx={idx}
                          ownerSplit={yr.ownerSplit}
                          onAddBooking={()=>addBooking(idx)}
                          onUpdateBooking={(id,f,v)=>updateBooking(idx,id,f,v)}
                          onRemoveBooking={(id)=>removeBooking(idx,id)}
                          onAddAdj={()=>addAdj(idx)}
                          onUpdateAdj={(id,f,v)=>updateAdj(idx,id,f,v)}
                          onRemoveAdj={(id)=>removeAdj(idx,id)}
                          onSetManualStart={(v)=>setManualStart(idx,v)}
                          onClearManualStart={()=>clearManualStart(idx)}
                          onSetManualContribution={(v)=>setManualContribution(idx,v)}
                          onClearManualContribution={()=>clearManualContribution(idx)}
                          onSetStatus={(s)=>setStatus(idx,s)}
                          isFirstMonth={idx===0}
                        />
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{padding:"8px 4px 0",fontSize:11,color:"var(--ink-soft)",fontStyle:"italic"}}>
        Contribution covers the gap between the starting balance and that month's expenses — income posts after.
      </div>
    </div>
  );
}

function StatusBadge({status, needsContribution, compact}){
  let cls="current", label=status||"Upcoming";
  if(status==="Paid") cls="paid";
  else if(status==="Upcoming") cls= needsContribution ? "upcoming" : "surplus";
  else cls="current";
  if(!needsContribution && status!=="Paid"){
    label = status==="Upcoming" ? (compact ? "No contribution" : "No contribution needed") : status;
  }
  return <span className={"flag "+cls}><span className="dot"></span>{label}</span>;
}

function MonthDetail({m, monthIdx, ownerSplit, onAddBooking, onUpdateBooking, onRemoveBooking,
  onAddAdj, onUpdateAdj, onRemoveAdj, onSetManualStart, onClearManualStart,
  onSetManualContribution, onClearManualContribution, onSetStatus, isFirstMonth}){

  const laddShare = m.M * (ownerSplit.ladd/100);
  const daneShare = m.M * (ownerSplit.dane/100);

  // sort bookings by check-in date; undated fall to bottom
  const sortedBookings = [...m.bookings].sort((a,b)=>{
    if(!a.checkIn && !b.checkIn) return 0;
    if(!a.checkIn) return 1;
    if(!b.checkIn) return -1;
    return a.checkIn < b.checkIn ? -1 : a.checkIn > b.checkIn ? 1 : 0;
  });

  return (
    <div className="month-detail-inner">
      <div>
        <div className="subhead">
          <span>Bookings — {m.name}</span>
          <button className="btn small" onClick={onAddBooking}>+ Add booking</button>
        </div>
        {m.bookings.length===0 ? (
          <div className="empty-note">No bookings entered yet for {m.name}.</div>
        ) : (
          <table className="mini-table">
            <thead><tr><th>Guest</th><th style={{width:160}}>Source</th><th className="num-cell">Amount</th><th></th></tr></thead>
            <tbody>
              {sortedBookings.map(b=>{
                const nights = (b.checkIn && b.checkOut)
                  ? Math.round((new Date(b.checkOut)-new Date(b.checkIn))/(1000*60*60*24))
                  : null;
                const fmtDate = d => d ? new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
                return (
                  <tr key={b.id}>
                    <td>
                      <input type="text" value={b.guest} placeholder="Guest name"
                        onChange={e=>onUpdateBooking(b.id,"guest",e.target.value)} />
                      <div style={{display:"flex",gap:4,marginTop:4,alignItems:"center"}}>
                        <input type="date" value={b.checkIn||""} title="Check-in"
                          style={{flex:1,fontSize:11,padding:"3px 5px",fontFamily:"'Courier New',monospace",color:"var(--ink-soft)"}}
                          onChange={e=>onUpdateBooking(b.id,"checkIn",e.target.value)} />
                        <span style={{color:"var(--ink-soft)",fontSize:11}}>→</span>
                        <input type="date" value={b.checkOut||""} title="Check-out"
                          style={{flex:1,fontSize:11,padding:"3px 5px",fontFamily:"'Courier New',monospace",color:"var(--ink-soft)"}}
                          onChange={e=>onUpdateBooking(b.id,"checkOut",e.target.value)} />
                        {nights!==null && nights>0 && (
                          <span style={{fontFamily:"'Courier New',monospace",fontSize:10,color:"var(--ink-soft)",whiteSpace:"nowrap"}}>{nights}n</span>
                        )}
                      </div>
                    </td>
                    <td>
                      <select className="src" value={b.source||"Direct"} onChange={e=>onUpdateBooking(b.id,"source",e.target.value)}>
                        <option>Direct</option>
                        <option>VRBO</option>
                        <option>Couples Airbnb</option>
                        <option>Whole House Airbnb</option>
                      </select>
                    </td>
                    <td>
                      <input type="number" step="0.01" value={b.amount}
                        onChange={e=>onUpdateBooking(b.id,"amount",e.target.value)}
                        style={{textAlign:"right"}} />
                    </td>
                    <td><button className="icon-btn" title="Remove" onClick={()=>onRemoveBooking(b.id)}>×</button></td>
                  </tr>
                );
              })}
              <tr className="tr-total">
                <td colSpan="2">Total Projected Income</td>
                <td className="num-cell">{fmt(m.totalIncome)}</td>
                <td></td>
              </tr>
            </tbody>
          </table>
        )}

        <div className="subhead" style={{marginTop:18}}>
          <span>Expense adjustments — one-off changes vs. baseline</span>
          <button className="btn small" onClick={onAddAdj}>+ Add adjustment</button>
        </div>
        {m.expenseAdjustments.length===0 ? (
          <div className="empty-note">Using baseline of {fmt(m.baseline)} with no adjustments.</div>
        ) : (
          <table className="mini-table">
            <thead><tr><th>Reason</th><th className="num-cell">Amount</th><th></th></tr></thead>
            <tbody>
              {m.expenseAdjustments.map(a=>(
                <tr key={a.id}>
                  <td><input type="text" value={a.label} placeholder="e.g. Mortgage timing shift"
                    onChange={e=>onUpdateAdj(a.id,"label",e.target.value)} /></td>
                  <td>
                    <input type="number" step="0.01" value={a.amount}
                      onChange={e=>onUpdateAdj(a.id,"amount",e.target.value)}
                      style={{textAlign:"right"}} placeholder="+/- amount" />
                  </td>
                  <td><button className="icon-btn" title="Remove" onClick={()=>onRemoveAdj(a.id)}>×</button></td>
                </tr>
              ))}
              <tr className="tr-total">
                <td>Total Expense ({fmt(m.baseline)} baseline {m.adjTotal>=0?"+":"-"} {fmt(Math.abs(m.adjTotal))} adj.)</td>
                <td className="num-cell">{fmt(m.totalExpense)}</td>
                <td></td>
              </tr>
            </tbody>
          </table>
        )}
      </div>

      <div>
        <div className="subhead"><span>Balance &amp; Contribution</span></div>

        {isFirstMonth ? (
          <div className="field-row">
            <label>Actual starting balance</label>
            <input type="number" step="0.01" value={m.manualStartingBalance ?? ""}
              onChange={e=>onSetManualStart(e.target.value)} placeholder="from bank statement" />
          </div>
        ) : (
          <div className="field-row">
            <label>Override starting bal.</label>
            <input type="number" step="0.01" value={m.manualStartingBalance ?? ""}
              onChange={e=>onSetManualStart(e.target.value)}
              placeholder={fmt(m.L)+" (rolled forward)"} />
            {m.manualStartingBalance!==null && (
              <button className="btn ghost small" onClick={onClearManualStart}>reset to rollover</button>
            )}
          </div>
        )}

        <div className="field-row">
          <label>Status</label>
          <select value={m.contributionStatus||"Upcoming"} onChange={e=>onSetStatus(e.target.value)}>
            <option>Upcoming</option>
            <option>Paid</option>
            <option>Current</option>
          </select>
        </div>

        <div className="field-row">
          <label>Override contribution</label>
          <input type="number" step="0.01" value={m.manualContribution ?? ""}
            onChange={e=>onSetManualContribution(e.target.value)}
            placeholder={fmt(m.calculatedM)+" (calculated)"} />
          {m.hasContributionOverride && (
            <button className="btn ghost small" onClick={onClearManualContribution}>reset to calculated</button>
          )}
        </div>

        <div className="calc-strip">
          Starting balance <span className="eq">{fmt(m.L)}</span><br/>
          + Contribution <span className="eq">{fmt(m.M)}</span>
          {m.hasContributionOverride && <span className="muted"> (overridden)</span>}<br/>
          + Income <span className="eq">{fmt(m.totalIncome)}</span><br/>
          − Expenses <span className="eq">{fmt(m.totalExpense)}</span><br/>
          = Ending balance <span className="eq">{fmt(m.N)}</span><br/>
          <span className="muted">→ rolls forward as next month's starting balance</span>
        </div>

        {m.M > 0.01 && (
          <div className="calc-strip" style={{marginTop:10}}>
            <b>Contribution due at start of {m.name}:</b><br/>
            Ladd ({ownerSplit.ladd}%) <span className="eq">{fmt(laddShare)}</span><br/>
            Dane ({ownerSplit.dane}%) <span className="eq">{fmt(daneShare)}</span>
          </div>
        )}
        {m.M < 0.01 && m.N > m.L + 0.01 && (
          <div className="calc-strip" style={{marginTop:10}}>
            No contribution needed — income covers expenses with <b>{fmt(m.N - m.L)}</b> net gain this month.
          </div>
        )}
      </div>
    </div>
  );
}

// ---------------- EXPENSES VIEW ----------------
function ExpensesView({yr, updateYear, showToast}){
  // For the summary, show current-month effective amounts
  const now = new Date();
  const currentKey = `${yr.year}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const baselineNow = yr.expenseItems.reduce((s,e)=>s+effectiveAmount(e,currentKey),0);
  const annualEstimate = yr.expenseItems.reduce((s,e)=>{
    let total=0;
    for(let mo=1;mo<=12;mo++){
      const k=`${yr.year}-${String(mo).padStart(2,'0')}`;
      total+=effectiveAmount(e,k);
    }
    return s+total;
  },0);

  const [expandedChanges, setExpandedChanges] = useState({});
  const toggleChanges=(id)=>setExpandedChanges(prev=>({...prev,[id]:!prev[id]}));

  const addItem=()=>{
    updateYear(y=>{ y.expenseItems.push({id:uid(), name:"", amount:0, changes:[]}); });
  };
  const updateItem=(id, field, val)=>{
    updateYear(y=>{
      const it = y.expenseItems.find(x=>x.id===id);
      if(it) it[field] = field==="amount" ? (val===""?"":Number(val)) : val;
    });
  };
  const removeItem=(id)=>{
    updateYear(y=>{ y.expenseItems = y.expenseItems.filter(x=>x.id!==id); });
  };
  const addChange=(itemId)=>{
    updateYear(y=>{
      const it = y.expenseItems.find(x=>x.id===itemId);
      if(it){ if(!it.changes) it.changes=[]; it.changes.push({id:uid(), amount:0, effectiveMonth:""}); }
    });
  };
  const updateChange=(itemId, changeId, field, val)=>{
    updateYear(y=>{
      const it = y.expenseItems.find(x=>x.id===itemId);
      if(it){ const ch = (it.changes||[]).find(c=>c.id===changeId);
        if(ch) ch[field] = field==="amount" ? (val===""?"":Number(val)) : val; }
    });
  };
  const removeChange=(itemId, changeId)=>{
    updateYear(y=>{
      const it = y.expenseItems.find(x=>x.id===itemId);
      if(it) it.changes = (it.changes||[]).filter(c=>c.id!==changeId);
    });
  };
  const setSplit=(owner, val)=>{
    updateYear(y=>{
      const v = Math.max(0,Math.min(100,Number(val)||0));
      if(owner==="ladd"){ y.ownerSplit.ladd=v; y.ownerSplit.dane=100-v; }
      else { y.ownerSplit.dane=v; y.ownerSplit.ladd=100-v; }
    });
  };

  const MONTH_OPTS = Array.from({length:12},(_,i)=>{
    const k=`${yr.year}-${String(i+1).padStart(2,'0')}`;
    return {value:k, label:MONTH_NAMES[i]};
  });

  return (
    <div>
      <div className="card">
        <h2>Baseline Monthly Expenses <span className="hint">amounts can change mid-year with an effective date</span></h2>
        <table className="mini-table">
          <thead><tr><th>Item</th><th className="num-cell" style={{width:130}}>Base Amount</th><th style={{width:110}}></th><th></th></tr></thead>
          <tbody>
            {yr.expenseItems.map(it=>{
              const changes = (it.changes||[]).slice().sort((a,b)=>a.effectiveMonth<b.effectiveMonth?-1:1);
              const hasChanges = changes.length>0;
              const isExpanded = expandedChanges[it.id];
              const currentAmt = effectiveAmount(it, currentKey);
              const changed = currentAmt !== (Number(it.amount)||0);
              return (
                <React.Fragment key={it.id}>
                  <tr>
                    <td>
                      <input type="text" value={it.name} onChange={e=>updateItem(it.id,"name",e.target.value)} />
                    </td>
                    <td>
                      <input type="number" step="0.01" value={it.amount} style={{textAlign:"right"}}
                        onChange={e=>updateItem(it.id,"amount",e.target.value)} />
                    </td>
                    <td style={{textAlign:"right",paddingRight:6}}>
                      {changed && (
                        <span style={{fontFamily:"'Courier New',monospace",fontSize:10,color:"var(--pine)",marginRight:8}}>
                          now {fmt(currentAmt)}
                        </span>
                      )}
                      <button className="link-btn" style={{fontSize:10}} onClick={()=>{
                        if(!isExpanded) addChange(it.id);
                        toggleChanges(it.id);
                      }}>
                        {isExpanded ? "done" : hasChanges ? `${changes.length} change${changes.length>1?"s":""}` : "+ rate change"}
                      </button>
                    </td>
                    <td><button className="icon-btn" onClick={()=>removeItem(it.id)}>×</button></td>
                  </tr>
                  {isExpanded && (
                    <tr>
                      <td colSpan="4" style={{paddingLeft:16,paddingBottom:12,background:"#f7f4ee"}}>
                        <div style={{fontFamily:"'Courier New',monospace",fontSize:10,textTransform:"uppercase",
                          letterSpacing:"0.06em",color:"var(--ink-soft)",margin:"6px 0 8px"}}>
                          Rate changes — override base amount from a specific month onward
                        </div>
                        {changes.map(ch=>(
                          <div key={ch.id} style={{display:"flex",gap:8,marginBottom:6,alignItems:"center"}}>
                            <select value={ch.effectiveMonth} style={{fontFamily:"'Courier New',monospace",fontSize:11,flex:"0 0 130px"}}
                              onChange={e=>updateChange(it.id,ch.id,"effectiveMonth",e.target.value)}>
                              <option value="">— pick month —</option>
                              {MONTH_OPTS.map(o=><option key={o.value} value={o.value}>{o.label} {yr.year}</option>)}
                            </select>
                            <span style={{fontSize:11,color:"var(--ink-soft)"}}>→</span>
                            <input type="number" step="0.01" value={ch.amount} placeholder="new amount"
                              style={{width:90,textAlign:"right",fontSize:12}}
                              onChange={e=>updateChange(it.id,ch.id,"amount",e.target.value)} />
                            <span style={{fontSize:11,color:"var(--ink-soft)"}}>/mo</span>
                            <button className="icon-btn" onClick={()=>removeChange(it.id,ch.id)}>×</button>
                          </div>
                        ))}
                        <button className="btn ghost small" style={{marginTop:4}} onClick={()=>addChange(it.id)}>+ add another change</button>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
            <tr className="tr-total">
              <td>Current Monthly Total</td>
              <td className="num-cell">{fmt(baselineNow)}</td>
              <td></td><td></td>
            </tr>
          </tbody>
        </table>
        <div style={{marginTop:10}}>
          <button className="btn small" onClick={addItem}>+ Add expense item</button>
        </div>
      </div>

      <div className="card">
        <h2>Annual Estimate <span className="hint">accounts for all rate changes</span></h2>
        <div className="stat-row">
          <div className="stat"><div className="num">{fmtShort(annualEstimate)}</div><div className="lbl">{yr.year} Estimated Expenses</div></div>
        </div>
      </div>

      <div className="card">
        <h2>Ownership Split</h2>
        <div className="field-row">
          <label>Ladd's share (%)</label>
          <input type="number" value={yr.ownerSplit.ladd} onChange={e=>setSplit("ladd",e.target.value)} style={{maxWidth:90}} />
        </div>
        <div className="field-row">
          <label>Dane's share (%)</label>
          <input type="number" value={yr.ownerSplit.dane} onChange={e=>setSplit("dane",e.target.value)} style={{maxWidth:90}} />
        </div>
        <div className="empty-note">Used to split owner contributions on the Contributions tab.</div>
      </div>
    </div>
  );
}

// ---------------- CONTRIBUTIONS VIEW ----------------
function ContributionsView({yr, updateYear}){
  const computed = useMemo(()=>computeMonths(yr),[yr]);
  let laddTotal=0, daneTotal=0, totalDue=0;

  return (
    <div className="card" style={{padding:0}}>
      <div style={{padding:"22px 24px 4px"}}>
        <h2 style={{margin:0}}>Owner Contribution Schedule <span className="hint">Ladd {yr.ownerSplit.ladd}% / Dane {yr.ownerSplit.dane}%</span></h2>
      </div>
      <table>
        <thead>
          <tr>
            <th>Month (due 1st)</th>
            <th className="num-cell">Total Due</th>
            <th className="num-cell">Ladd ({yr.ownerSplit.ladd}%)</th>
            <th className="num-cell">Dane ({yr.ownerSplit.dane}%)</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          {computed.map(m=>{
            if(m.notTracked){
              return (
                <tr key={m.id} style={{opacity:0.5}}>
                  <td className="muted" style={{fontStyle:"italic"}}>{m.name} 1</td>
                  <td colSpan="4" className="muted" style={{fontStyle:"italic"}}>Not tracked</td>
                </tr>
              );
            }
            const due = m.M;
            const ladd = due * (yr.ownerSplit.ladd/100);
            const dane = due * (yr.ownerSplit.dane/100);
            if(due>0.01){ laddTotal+=ladd; daneTotal+=dane; totalDue+=due; }
            return (
              <tr key={m.id}>
                <td>{m.name} 1</td>
                <td className={"num-cell"+(due>0.01?" neg":"")}>
                  {due>0.01 ? fmt(due) : "—"}
                </td>
                <td className="num-cell">{due>0.01?fmt(ladd):"—"}</td>
                <td className="num-cell">{due>0.01?fmt(dane):"—"}</td>
                <td><StatusBadge status={m.contributionStatus} needsContribution={due>0.01} /></td>
              </tr>
            );
          })}
          <tr className="tr-total">
            <td>Total ({yr.year})</td>
            <td className="num-cell">{fmt(totalDue)}</td>
            <td className="num-cell">{fmt(laddTotal)}</td>
            <td className="num-cell">{fmt(daneTotal)}</td>
            <td></td>
          </tr>
        </tbody>
      </table>
      <div className="note-box" style={{margin:"0 24px 22px"}}>
        Only months with a positive contribution count toward owner totals. Surplus months (shown in parentheses) reduce future needs automatically through the rolling balance — they aren't billed back to owners.
      </div>
    </div>
  );
}

// ---------------- RANGER VIEW ----------------
function RangerView({yr, updateYear}){
  const addItem=(monthIdx)=>{
    updateYear(y=>{ y.months[monthIdx].ranger.push({id:uid(), label:"", amount:0}); });
  };
  const updateItem=(monthIdx, id, field, val)=>{
    updateYear(y=>{
      const it = y.months[monthIdx].ranger.find(x=>x.id===id);
      if(it) it[field] = field==="amount" ? (val===""?"":Number(val)) : val;
    });
  };
  const removeItem=(monthIdx,id)=>{
    updateYear(y=>{ y.months[monthIdx].ranger = y.months[monthIdx].ranger.filter(x=>x.id!==id); });
  };

  const computed = useMemo(()=>computeMonths(yr),[yr]);
  const total = computed.reduce((s,m)=>s+m.rangerTotal,0);
  const winterMonths = computed.filter(m=>["November","December","January","February","March"].includes(m.name));

  return (
    <div>
      <div className="card">
        <h2>Polaris Ranger Income <span className="hint">tracked separately from the cabin operating account</span></h2>
        <div className="stat-row">
          <div className="stat"><div className="num">{fmtShort(total)}</div><div className="lbl">{yr.year} Ranger Total</div></div>
          <div className="stat"><div className="num">{fmtShort(winterMonths.reduce((s,m)=>s+m.rangerTotal,0))}</div><div className="lbl">Winter Months (Nov–Mar) Total</div></div>
        </div>
      </div>
      <div className="card" style={{padding:0}}>
        <table>
          <thead><tr><th style={{width:"18%"}}>Month</th><th>Entries</th><th className="num-cell" style={{width:120}}>Total</th></tr></thead>
          <tbody>
            {computed.map((m,idx)=>(
              <tr key={m.id}>
                <td style={{fontWeight:600,verticalAlign:"top",paddingTop:12}}>{m.name}</td>
                <td>
                  {m.ranger.length===0 && <span className="empty-note">No Ranger income logged.</span>}
                  {m.ranger.map(r=>(
                    <div key={r.id} style={{display:"flex",gap:6,marginBottom:5,alignItems:"center"}}>
                      <input type="text" value={r.label} placeholder="renter / note" style={{flex:1}}
                        onChange={e=>updateItem(idx,r.id,"label",e.target.value)} />
                      <input type="number" step="0.01" value={r.amount} style={{width:100,textAlign:"right"}}
                        onChange={e=>updateItem(idx,r.id,"amount",e.target.value)} />
                      <button className="icon-btn" onClick={()=>removeItem(idx,r.id)}>×</button>
                    </div>
                  ))}
                  <button className="btn ghost small" onClick={()=>addItem(idx)}>+ add entry</button>
                </td>
                <td className="num-cell" style={{verticalAlign:"top",paddingTop:12}}>{fmt(m.rangerTotal)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ---------------- ANALYTICS VIEW ----------------
function AnalyticsView({years, yr, yearKeys}){
  const computed = useMemo(()=>computeMonths(yr),[yr]);
  // sum actual per-month expenses from computed (already rate-change-aware)
  const annualExpenseEst = computed.reduce((s,m)=>s+m.totalExpense,0);
  const totalIncome = computed.reduce((s,m)=>s+m.totalIncome,0);
  const pctBreakeven = annualExpenseEst>0 ? (totalIncome/annualExpenseEst*100) : 0;
  const profit = totalIncome - annualExpenseEst; // positive once past breakeven

  // source breakdown across all months in active year
  const sourceTotals = {Direct:0, VRBO:0, "Couples Airbnb":0, "Whole House Airbnb":0};
  let anyTagged = false;
  computed.forEach(m=>m.bookings.forEach(b=>{
    const src = b.source || "Direct";
    if(b.sourceTagged) anyTagged = true;
    sourceTotals[src] = (sourceTotals[src]||0) + (Number(b.amount)||0);
  }));
  const sourceTotalAll = Object.values(sourceTotals).reduce((a,b)=>a+b,0) || 1;

  // bookings per month count, avg booking value
  const monthlyBookingCounts = computed.map(m=>({name:m.name, count:m.bookings.length, income:m.totalIncome}));
  const trackedMonths = computed.filter(m=>!m.notTracked);
  const maxIncome = Math.max(1, ...trackedMonths.map(m=>m.totalIncome));
  const totalBookings = computed.reduce((s,m)=>s+m.bookings.length,0);
  const avgBookingValue = totalBookings>0 ? totalIncome/totalBookings : 0;

  // breakeven per month: income vs expense
  const monthsAtOrAboveBreakeven = trackedMonths.filter(m=>m.totalIncome >= m.totalExpense).length;

  // multi-year comparison if available
  const yearTotals = yearKeys.map(yk=>{
    const c = computeMonths(years[yk]);
    return {
      year: yk,
      income: c.reduce((s,m)=>s+m.totalIncome,0),
      expense: c.reduce((s,m)=>s+m.totalExpense,0),
      contribution: c.reduce((s,m)=>s+Math.max(0,m.M),0),
    };
  });
  const maxYearVal = Math.max(1, ...yearTotals.flatMap(y=>[y.income,y.expense]));

  return (
    <div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <button className="btn small" onClick={()=>printReport(buildYTDReport(yr,years,yearKeys))}>⬇ YTD &amp; Annual Report (PDF)</button>
        {yearKeys.length>1 && (
          <button className="btn small" onClick={()=>printReport(buildYoYReport(years,yearKeys))}>⬇ Year over Year Report (PDF)</button>
        )}
      </div>
      <div className="card">
        <h2>Break-Even Snapshot <span className="hint">{yr.year}</span></h2>
        <div className="stat-row">
          <div className="stat"><div className="num">{fmtShort(totalIncome)}</div><div className="lbl">Projected Income YTD</div></div>
          <div className="stat warn"><div className="num">{fmtShort(annualExpenseEst)}</div><div className="lbl">Annual Expense Estimate</div></div>
          <div className={"stat "+(pctBreakeven>=100?"good":"warn")}><div className="num">{pctBreakeven.toFixed(1)}%</div><div className="lbl">Of Break-Even Covered</div></div>
          <div className={"stat "+(profit>=0?"good":"warn")}>
            <div className="num">{profit>=0 ? fmtShort(profit) : "—"}</div>
            <div className="lbl">Profit {profit<0 && "(once past breakeven)"}</div>
          </div>
          <div className="stat"><div className="num">{monthsAtOrAboveBreakeven}/{trackedMonths.length}</div><div className="lbl">Months Income ≥ Expense</div></div>
        </div>
        <div className="gauge-track">
          <div className={"gauge-fill"+(pctBreakeven>100?" over":"")} style={{width:Math.min(100,pctBreakeven)+"%"}}></div>
        </div>
        <div className="empty-note" style={{marginTop:6}}>
          {pctBreakeven>=100
            ? `Break-even covered — ${fmt(profit)} in profit above the annual estimate.`
            : `Projected income falls short of the annual estimate by ${fmt(annualExpenseEst-totalIncome)}.`}
        </div>
      </div>

      <div className="two-col">
        <div className="card">
          <h2>Income by Source</h2>
          {!anyTagged ? (
            <div className="empty-note">
              No bookings have a source tagged yet. Open a month on the Ledger tab and set Direct / VRBO / Couples Airbnb / Whole House Airbnb on each booking — this card fills in as you tag them.
            </div>
          ) : (
            Object.entries(sourceTotals).filter(([,v])=>v>0).map(([src,val])=>(
              <div key={src} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                  <span>{sourceTag(src)}</span>
                  <span className="muted">{fmt(val)} · {(val/sourceTotalAll*100).toFixed(0)}%</span>
                </div>
                <div className="gauge-track">
                  <div className="gauge-fill" style={{width:(val/sourceTotalAll*100)+"%"}}></div>
                </div>
              </div>
            ))
          )}
        </div>

        <div className="card">
          <h2>Booking Stats</h2>
          <div className="stat-row" style={{gridTemplateColumns:"1fr 1fr"}}>
            <div className="stat"><div className="num">{totalBookings}</div><div className="lbl">Total Bookings</div></div>
            <div className="stat"><div className="num">{fmtShort(avgBookingValue)}</div><div className="lbl">Avg. Booking Value</div></div>
          </div>
        </div>
      </div>

      <div className="card">
        <h2>Monthly Income vs. Expense</h2>
        <table className="mini-table">
          <thead><tr><th>Month</th><th></th><th className="num-cell">Income</th><th className="num-cell">Expense</th></tr></thead>
          <tbody>
            {trackedMonths.map(m=>(
              <tr key={m.id}>
                <td style={{width:90}}>{m.name.slice(0,3)}</td>
                <td>
                  <div style={{position:"relative",height:16,background:"var(--line)",borderRadius:2,overflow:"hidden"}}>
                    <div style={{position:"absolute",left:0,top:0,height:"100%",
                      width:(m.totalExpense/maxIncome*100)+"%", background:"#e2c9b8"}}></div>
                    <div style={{position:"absolute",left:0,top:0,height:"100%",
                      width:(m.totalIncome/maxIncome*100)+"%", background:"var(--pine)", opacity:0.85}}></div>
                  </div>
                </td>
                <td className="num-cell" style={{width:90}}>{fmtShort(m.totalIncome)}</td>
                <td className="num-cell" style={{width:90}}>{fmtShort(m.totalExpense)}</td>
              </tr>
            ))}
          </tbody>
        </table>
        <div className="empty-note" style={{marginTop:8}}>
          <span style={{display:"inline-block",width:10,height:10,background:"var(--pine)",marginRight:4,verticalAlign:"middle"}}></span> Income
          <span style={{display:"inline-block",width:10,height:10,background:"#e2c9b8",marginRight:4,marginLeft:14,verticalAlign:"middle"}}></span> Expense
        </div>
      </div>

      {yearKeys.length>1 && (
        <div className="card">
          <h2>Year over Year</h2>
          <table className="mini-table">
            <thead><tr><th>Year</th><th></th><th className="num-cell">Income</th><th className="num-cell">Expense</th><th className="num-cell">Contributions</th></tr></thead>
            <tbody>
              {yearTotals.map(y=>(
                <tr key={y.year}>
                  <td style={{width:70,fontWeight:600}}>{y.year}</td>
                  <td>
                    <div style={{position:"relative",height:16,background:"var(--line)",borderRadius:2,overflow:"hidden"}}>
                      <div style={{position:"absolute",left:0,top:0,height:"100%",
                        width:(y.expense/maxYearVal*100)+"%", background:"#e2c9b8"}}></div>
                      <div style={{position:"absolute",left:0,top:0,height:"100%",
                        width:(y.income/maxYearVal*100)+"%", background:"var(--pine)", opacity:0.85}}></div>
                    </div>
                  </td>
                  <td className="num-cell" style={{width:100}}>{fmtShort(y.income)}</td>
                  <td className="num-cell" style={{width:100}}>{fmtShort(y.expense)}</td>
                  <td className="num-cell" style={{width:100}}>{fmtShort(y.contribution)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
